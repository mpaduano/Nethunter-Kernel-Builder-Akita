name: Build NetHunter Kernel for Pixel 8a (Akita)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Set up Clang
      uses: actions/setup-toolchain@v2
      with:
        toolchain: 'clang'
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi \
          git \
          curl \
          wget \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          python3 \
          python3-dev \
          cmake \
          ninja-build \
          ccache

    - name: Set up Build Environment
      run: |
        export KERNEL_SOURCE="https://android.googlesource.com/device/google/akita-kernels/6.1"
        export ARCH=arm64
        export CROSS_COMPILE=$HOME/clang/bin/clang
        export CLANG_TRIPLE=aarch64-linux-gnu-

    - name: Clone Kernel Source
      run: git clone $KERNEL_SOURCE kernel

    - name: Set up Defconfig and Kernel Configuration
      run: |
        cd kernel
        make zuma_defconfig  # Ensure you're using the correct defconfig for Pixel 8a (akita)

    - name: Build Kernel
      run: |
        cd kernel
        make -j$(nproc)  # Adjust based on the GitHub Actions runner's CPU cores

    - name: Package Kernel with AnyKernel3
      run: |
        cd AnyKernel3
        ./anykernel.sh
