name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show current directory and list
        run: |
          echo "PWD is: $(pwd)"
          ls

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}

     env:
      kernelDir: tensor101-nethunter_akita
      kernelName: android_kernel_google_zuma
      kernelRepo: https://github.com/kerneltoast/android_kernel_google_zuma
      kernelBranch: 16.0.0-sultan
      kernelDevice: akita
      DEFCONFIG_NAME: zuma_defconfig
      withKernelSU: ${{ matrix.repos.withKernelSU }}
      ARCH: ${{ matrix.repos.params.ARCH }}

      # Use the platform defconfig from this tree
      DEFCONFIG_NAME: zuma_defconfig

      withKernelSU: ${{ matrix.repos.withKernelSU }}
      ARCH: ${{ matrix.repos.params.ARCH }}

    steps:
      - name: "✨ Create working dir"
        run: mkdir -p "$kernelDir"

      - name: "📂 Show workspace"
        run: |
          echo "PWD is: $(pwd)"
          ls

      - name: "🧹 Free up space on runner"
        run: |
          echo "=== Disk usage BEFORE cleanup ==="
          df -h

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache || true

          echo "=== Disk usage AFTER cleanup ==="
          df -h

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc curl git zip ftp \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libssl-dev lftp zstd wget libfl-dev \
            python3 libarchive-tools

      - name: "🌟 Clone kernel source => (${{ env.kernelRepo }})"
        working-directory: ./${{ env.kernelDir }}
        run: |
          echo "Cloning kernel repo into: $(pwd)/${{ env.kernelName }}"
          git clone --recursive --branch "$kernelBranch" "$kernelRepo" "$kernelName" --depth=1

      - name: "📏 Check disk usage before cloning toolchains"
        run: |
          echo "=== df -h ==="
          df -h
          echo
          echo "=== Workspace size ==="
          du -sh . || echo "du failed"

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          echo "PWD for toolchains: $(pwd)"
          toolchains_num="$(echo "$toolchains" | jq 'length')"
          echo "Toolchains to clone: $toolchains_num"

          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo "$toolchains" | jq -r ".[$i].name")
            repo=$(echo "$toolchains" | jq -r ".[$i].repo")
            branch=$(echo "$toolchains" | jq -r ".[$i].branch")

            echo "Cloning toolchain: $name from $repo (branch: $branch)"
            git clone --recursive --branch "$branch" "$repo" "$name" --depth=1

            echo "$(pwd)/$name/" >> "$GITHUB_PATH"
            echo "$(pwd)/$name/bin" >> "$GITHUB_PATH"
          done

          echo "PATH Variable after toolchains: $PATH"

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
          extraParams: "${{ toJSON(matrix.repos.extraParams) }}"
          THREAD: $(nproc --all)
        run: |
          echo "PATH Variable: $PATH"
          ARCH=$(echo "$params" | jq -r ".ARCH")
          CROSS_COMPILE=$(echo "$params" | jq -r ".CROSS_COMPILE")
          CROSS_COMPILE_COMPAT=$(echo "$params" | jq -r ".CROSS_COMPILE_COMPAT")
          CROSS_COMPILE_ARM32=$(echo "$params" | jq -r ".CROSS_COMPILE_ARM32")
          CLANG_TRIPLE=$(echo "$params" | jq -r ".CLANG_TRIPLE")
          AR=$(echo "$params" | jq -r ".AR")
          CC=$(echo "$params" | jq -r ".CC")

          echo "ARCH=$ARCH" >> $GITHUB_ENV

          args="-j$(nproc --all)"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p "$(pwd)/${{ env.OUT_DIR }}"
            args="$args O=$(pwd)/${{ env.OUT_DIR }}"
          fi
          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          if [ -n "$CROSS_COMPILE" ]; then
            args="$args CROSS_COMPILE=$CROSS_COMPILE"
          fi
          if [ -n "$CLANG_TRIPLE" ]; then
            args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          fi
          if [ -n "$CROSS_COMPILE_COMPAT" ]; then
            args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_COMPAT"
          fi
          if [ -n "$AR" ]; then
            args="$args AR=$AR"
          fi
          if [ -n "$CC" ]; then
            args="$args CC=$CC"
          fi

          echo "args=$args" >> $GITHUB_OUTPUT
          echo "extraParams_toJson: $extraParams"

          extra_params=$(echo "$extraParams" | jq -r ' to_entries[] | select(.value != "") | "\(.key)=\(.value)"' | tr "\n" " " | sed 's/ $//')
          echo "args=$args $extra_params" >> $GITHUB_OUTPUT

      - name: "😋 Update KernelSU"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          if [ -d "./KernelSU" ]; then
            rm -rf "./KernelSU"
          fi
          if [ -d "./drivers/kernelsu" ]; then
            rm -rf "./drivers/kernelsu"
          fi

          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

          echo -e "\nCONFIG_KPROBES=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "\nCONFIG_HAVE_KPROBES=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "\nCONFIG_KPROBE_EVENTS=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}

          cat ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}

      - name: "🔍 List possible defconfigs"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          echo "PWD: $(pwd)"
          echo "Listing arch/arm64/configs:"
          ls arch/arm64/configs || echo "no arch/arm64/configs dir"
          echo
          echo "Grepping for zuma / gki / akita:"
          ls arch/arm64/configs | grep -Ei 'zuma|gki|akita' || echo "no matching defconfigs"

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      # Patch mm/vmscan.c to declare shrinker_rwsem if needed
      - name: "🐞 Patch shrinker_rwsem in vmscan"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          echo "Checking for shrinker_rwsem uses in mm/vmscan.c..."
          if ! grep -q 'shrinker_rwsem' mm/vmscan.c; then
            echo "No shrinker_rwsem references, skipping patch."
            exit 0
          fi

          if ! grep -q 'DECLARE_RWSEM(shrinker_rwsem)' mm/vmscan.c; then
            echo "Patching mm/vmscan.c to declare shrinker_rwsem"
            tmpfile=$(mktemp)

            awk '
              NR==1 {
                print "#include <linux/rwsem.h>"
                print "DECLARE_RWSEM(shrinker_rwsem);"
              }
              { print }
            ' mm/vmscan.c > "$tmpfile"

            mv "$tmpfile" mm/vmscan.c
          else
            echo "shrinker_rwsem already declared, nothing to do."
          fi

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          echo "Using make args: $args"

          # Run build and save full log
          make $args V=1 2>&1 | tee build.log
          build_rc=${PIPESTATUS[}

          echo "=== Last 80 lines of build.log ==="
          tail -n 80 build.log || true

          echo "=== Lines containing 'error' (case-insensitive) ==="
          grep -i "error" build.log || true

          exit $build_rc

      - name: "🏴‍☠️ Post Action "
        run: |
          pwd
          find ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/ -type f || true

      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
