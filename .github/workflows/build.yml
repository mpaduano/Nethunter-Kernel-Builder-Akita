name: Build Kernel for Pixel 8a (Akita)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2

    - name: Set up cross-compilation environment
      run: |
        sudo apt update
        sudo apt install -y clang llvm gcc-aarch64-linux-gnu make git wget

    - name: Set up kernel repository (clone kernel/common branch)
      run: |
        # Clone the Android kernel/common repo at the akita branch
           git clone --branch lineage-23.0 https://github.com/LineageOS/android_device_google_akita-kernels


    - name: List kernel tree (for debugging)
      run: |
        ls -R kernel_common | sed -n '1,200p'

    - name: Set up AnyKernel3 repo
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git

    - name: Verify kernel top-level and available defconfigs
      run: |
        set -eux
        cd kernel_common
        if [ ! -f Makefile ]; then
          echo "ERROR: No top-level Makefile found in kernel_common. Cannot run make."
          ls -la
          exit 1
        fi
        echo "Top of Makefile:"; head -n 5 Makefile || true
        echo "arch/arm64/configs contents:"; ls -la arch/arm64/configs || true
        grep -R --line-number 'gki_defconfig' arch/arm64/configs || true

    - name: Configure the kernel for Pixel 8a (Akita)
      run: |
        set -eux
        cd kernel_common
        # Apply the gki_defconfig (should exist in this kernel tree)
        make O=out ARCH=arm64 defconfig

    - name: Build the kernel
      run: |
        set -eux
        cd kernel_common
        make O=out ARCH=arm64 -j$(nproc)

    - name: Archive the kernel image
      run: |
        tar -czvf kernel_image.tar.gz kernel_common/out/arch/arm64/boot/Image || true

    - name: Upload the kernel image artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel_image.tar.gz
