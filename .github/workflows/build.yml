name: Build Kernel for Pixel 8a (Akita)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2

    - name: Set up cross-compilation environment
      run: |
        sudo apt update
        sudo apt install -y clang llvm gcc-aarch64-linux-gnu make git wget

    - name: List directory structure (for debugging)
      run: |
        ls -R device_google_akita-kernels_6.1

    - name: Set up kernel repository
      run: |
        # Clone the BiohazardousROM kernel repo (change if needed)
        git clone --branch 16 https://github.com/Biohazardousrom/device_google_akita-kernels_6.1.git

    - name: Set up AnyKernel3 repo
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git

    - name: Add gki_defconfig from Android Source
      run: |
        # This step assumes gki_defconfig is placed in the correct directory
        cd device_google_akita-kernels_6.1
        curl -o arch/arm64/configs/gki_defconfig https://android.googlesource.com/kernel/common/+/refs/heads/android-gs-akita-android16/arch/arm64/configs/gki_defconfig?format=TEXT

    - name: Configure the kernel for Pixel 8a (Akita)
      run: |
        cd device_google_akita-kernels_6.1
        # Apply the gki_defconfig
        make O=out ARCH=arm64 gki_defconfig

    - name: Build the kernel
      run: |
        cd device_google_akita-kernels_6.1
        make O=out ARCH=arm64 -j$(nproc)

    - name: Archive the kernel image
      run: |
        tar -czvf kernel_image.tar.gz out/arch/arm64/boot/Image

    - name: Upload the kernel image artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel_image.tar.gz
