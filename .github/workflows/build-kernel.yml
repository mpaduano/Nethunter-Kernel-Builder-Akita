name: Build NetHunter Kernel for Pixel 8a (Magisk)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      use_magisk:
        description: 'Use Magisk (uncheck for KernelSU)'
        required: false
        default: true
        type: boolean

env:
  KERNEL_SOURCE: https://github.com/LineageOS/android_kernel_google_gs101
  KERNEL_BRANCH: lineage-23.0
  DEVICE_NAME: akita
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-
  CLANG_TRIPLE: aarch64-linux-gnu
  TOOLCHAIN_REPO: https://github.com/kdrag0n/proton-clang.git
  TOOLCHAIN_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \\
            build-essential \\
            gcc-aarch64-linux-gnu \\
            gcc-arm-linux-gnueabi \\
            git \\
            curl \\
            wget \\
            bc \\
            bison \\
            flex \\
            libssl-dev \\
            libelf-dev \\
            python3 \\
            python3-dev \\
            cmake \\
            ninja-build \\
            ccache

      - name: Set up directories
        run: |
          mkdir -p kernel-build
          mkdir -p toolchain
          mkdir -p out

      - name: Clone toolchain
        run: |
          cd toolchain
          git clone --depth=1 -b ${{ env.TOOLCHAIN_BRANCH }} ${{ env.TOOLCHAIN_REPO }} proton-clang
          cd ..

      - name: Clone kernel source
        run: |
          cd kernel-build
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_SOURCE }} .
          cd ..

      - name: Patch kernel for Magisk support
        if: ${{ github.event.inputs.use_magisk != 'false' }}
        run: |
          cd kernel-build
          # Create Magisk module support patch
          # This enables proper separation for Magisk
          echo "Applying Magisk compatibility patches..."
          
          # If you have a specific Magisk patch file in your repo:
          # patch -p1 < ../patches/magisk-support.patch
          
          cd ..

      - name: Set up build environment
        run: |
          export PATH="${{ github.workspace }}/toolchain/proton-clang/bin:$PATH"
          export LD_LIBRARY_PATH="${{ github.workspace }}/toolchain/proton-clang/lib:$LD_LIBRARY_PATH"
          
          # Verify toolchain
          aarch64-linux-gnu-gcc --version
          clang --version

      - name: Configure kernel
        run: |
          cd kernel-build
          
          # Generate defconfig for Pixel 8a (akita)
          make O=../out \\
            ARCH=${{ env.ARCH }} \\
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \\
            CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} \\
            AR=llvm-ar \\
            CC=clang \\
            NM=llvm-nm \\
            OBJCOPY=llvm-objcopy \\
            ${DEVICE_NAME}_defconfig
          
          cd ..

      - name: Build kernel
        run: |
          cd kernel-build
          
          make O=../out \\
            ARCH=${{ env.ARCH }} \\
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \\
            CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} \\
            AR=llvm-ar \\
            CC=clang \\
            NM=llvm-nm \\
            OBJCOPY=llvm-objcopy \\
            CCACHE_SLOPPINESS=file_macro,locale,time_macros \\
            -j$(nproc --all)
          
          cd ..

      - name: Prepare boot image
        run: |
          cd out
          
          # Locate the kernel image
          if [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz ../Image.gz-magisk
          elif [ -f arch/arm64/boot/Image ]; then
            gzip -c arch/arm64/boot/Image > ../Image.gz-magisk
          fi
          
          # Copy DTB if needed
          if [ -f arch/arm64/boot/dts/google/gs101-akita.dtb ]; then
            cp arch/arm64/boot/dts/google/gs101-akita.dtb ../gs101-akita.dtb
          fi
          
          cd ..

      - name: Create Magisk module structure
        if: ${{ github.event.inputs.use_magisk != 'false' }}
        run: |
          mkdir -p magisk_module/system/lib/modules
          mkdir -p magisk_module/META-INF/com/google/android
          
          # Copy kernel modules
          if [ -d "out/arch/arm64/boot/modules" ]; then
            cp -r out/arch/arm64/boot/modules/* magisk_module/system/lib/modules/
          fi
          
          # Create module.prop
          cat > magisk_module/module.prop << 'EOF'
          id=nethunter_kernel_pixel8a
          name=NetHunter Kernel (Pixel 8a)
          version=1.0
          versionCode=1
          author=YourName
          description=NetHunter kernel with Magisk support for Pixel 8a
          EOF
          
          # Create install script
          cat > magisk_module/install.sh << 'EOF'
          #!/sbin/sh
          MODDIR=${0%/*}
          
          ui_print "Installing NetHunter Kernel for Pixel 8a..."
          ui_print "Device: akita"
          ui_print "Root method: Magisk"
          EOF
          chmod +x magisk_module/install.sh

      - name: Generate build info
        run: |
          cat > build_info.txt << EOF
          NetHunter Kernel Build Information
          ====================================
          Device: Pixel 8a (akita)
          Kernel Source: LineageOS Lineage 23.0
          Toolchain: Proton Clang (main)
          Root Method: Magisk
          Build Date: $(date)
          Commit: $(cd kernel-build && git rev-parse --short HEAD)
          Branch: ${{ env.KERNEL_BRANCH }}
          EOF

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-kernel-magisk
          path: |
            Image.gz-magisk
            gs101-akita.dtb
            magisk_module/
            build_info.txt
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Image.gz-magisk
            gs101-akita.dtb
            build_info.txt
          draft: false
          prerelease: false
